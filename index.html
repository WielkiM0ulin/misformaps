<!DOCTYPE html>
<html>
<head>
  <title>M is for Maps (and also Michaela) ❤️</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css"/>

  <style>
    body { margin:0; font-family:sans-serif; }

    #counter { padding:10px; background:#f4f4f4; text-align:center; font-weight:bold; }

    #progressContainer { height:12px; background:#ddd; }
    #progressBar { height:100%; width:0%; background:#4caf50; transition:0.3s; }

    #map { height:calc(100vh - 62px); }

    button {
      cursor:pointer;
      border:none;
      border-radius:4px;
      padding:6px 10px;
      background:#4caf50;
      color:white;
      margin-top: 5px;
    }

    button:hover { background:#45a049; }

    #statsPanel {
      position:absolute;
      top:70px;
      right:10px;
      background:white;
      padding:10px;
      display:none;
      z-index:1000;
      box-shadow:0 0 10px rgba(0,0,0,0.3);
      border-radius: 6px;
    }

    /* ICONS */
    .ikea-icon {
      transition: filter 0.4s ease, transform 0.2s ease;
      filter: grayscale(100%);
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .ikea-icon.visited {
      filter: grayscale(0%) drop-shadow(0 0 6px rgba(0,150,255,0.6));
    }

    .ikea-icon-container {
      background: transparent;
      border: none;
    }
    
    .ikea-icon-container:hover .ikea-icon { transform: scale(1.1); }

    /* ADD FORM */
    #formOverlay {
      position:fixed;
      top:0; left:0;
      width:100%; height:100%;
      background:rgba(0,0,0,0.5);
      display:none;
      justify-content:center;
      align-items:center;
      z-index:2000;
    }

    #formBox {
      background:white;
      padding:20px;
      border-radius:10px;
      width:250px;
    }

    input, select {
      width:100%;
      margin-bottom:10px;
      padding:5px;
      box-sizing: border-box;
    }
  </style>
</head>

<body>

<div id="counter"></div>
<div id="progressContainer"><div id="progressBar"></div></div>
<div id="map"></div>

<button onclick="toggleStatsPanel()" style="position:absolute; top:10px; right:10px; z-index:1000;">Stats</button>
<button onclick="enableAddMode()" style="position:absolute; top:10px; left:10px; z-index:1000;">➕ Add Place</button>

<div id="statsPanel"></div>

<div id="formOverlay">
  <div id="formBox">
    <h3>Add Place</h3>
    <input id="placeName" placeholder="Place name"/>
    <select id="placeType">
      <option value="date">💕 Date</option>
      <option value="visited">📍 Visited</option>
    </select>
    <button onclick="savePlace()">Save</button>
    <button onclick="closeForm()">Cancel</button>
  </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<script>
var map = L.map('map').setView([52.2,5.5],7);

L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
    subdomains: 'abcd',
    maxZoom: 20
}).addTo(map);

// Define markers cluster group BEFORE adding markers to it
var markers = L.markerClusterGroup({
  showCoverageOnHover: false,
  spiderfyOnMaxZoom: false,
  disableClusteringAtZoom: 10,
  iconCreateFunction: function(cluster) {
    // 1. Get all markers inside this specific cluster
    const childMarkers = cluster.getAllChildMarkers();
    
    // 2. Check if EVERY marker in this cluster is visited
    // We check the locId against our isVisited() function
    const allVisited = childMarkers.every(m => isVisited(m.locId));

    // 3. Apply the grayscale filter if not all are visited
    const clusterStyle = allVisited 
      ? "filter: grayscale(0%) drop-shadow(0 0 6px rgba(0,150,255,0.6));" 
      : "filter: grayscale(100%); opacity: 0.8;";

    return L.divIcon({
      html: `<div style="position:relative; ${clusterStyle}">
               <img src="https://upload.wikimedia.org/wikipedia/commons/c/c5/Ikea_logo.svg" style="width:40px;">
               <div style="position:absolute; top:-8px; right:-12px; background:${allVisited ? '#4caf50' : '#888'}; color:white; border-radius:50%; width:20px; height:20px; text-align:center; font-size:12px; line-height:20px; font-weight:bold;">
                 ${cluster.getChildCount()}
               </div>
             </div>`,
      className: '',
      iconSize: [40, 40]
    });
  }
});
map.addLayer(markers);

// Set IKEA categories
ikeaLocations.forEach(loc => loc.category = "ikea");

// -------- GLOBAL LIST --------
let locations = [...ikeaLocations];

// -------- STORAGE --------
function isVisited(id){ return localStorage.getItem(id)==='true'; }

// -------- ICONS --------
function getIcon(loc){
  // For custom non-IKEA places, we use cute emojis!
  if (loc.category && loc.category !== "ikea") {
    const emoji = loc.category === "date" ? "💕" : "📍";
    return L.divIcon({
      html: `<div style="font-size:24px; text-align:center; filter:drop-shadow(0px 2px 2px rgba(0,0,0,0.5));">${emoji}</div>`,
      className: '',
      iconSize: [30,30],
      iconAnchor: [15,30]
    });
  }

  // For IKEA, we use your CSS filter logic applied to a public SVG logo!
  const visited = isVisited(loc.id);
  const cssClass = visited ? "ikea-icon visited" : "ikea-icon";
  
  return L.divIcon({
    html: `<img src="https://upload.wikimedia.org/wikipedia/commons/c/c5/Ikea_logo.svg" class="${cssClass}">`,
    className: 'ikea-icon-container',
    iconSize: [50, 20],
    iconAnchor: [25, 10]
  });
}

function saveCustomPlaces(){
  const custom = locations
    .filter(l => l.category && l.category !== "ikea")
    .map(l => ({
      id: l.id,
      name: l.name,
      lat: l.lat,
      lng: l.lng,
      category: l.category,
      continent: l.continent,
      country: l.country
    }));

  localStorage.setItem("customPlaces", JSON.stringify(custom));
}

function loadCustomPlaces(){
  const saved = JSON.parse(localStorage.getItem("customPlaces")||"[]");
  locations.push(...saved);
}

// -------- MARKERS --------
function addMarker(loc){
  const marker = L.marker([loc.lat,loc.lng],{
    icon: getIcon(loc), 
    draggable: loc.category !== "ikea"
  });

  marker.locId = loc.id;
  marker.bindPopup(createPopup(loc));

  marker.on('dragend', function(e){
    const pos = e.target.getLatLng();
    loc.lat = pos.lat;
    loc.lng = pos.lng;
    saveCustomPlaces();
  });

  loc.marker = marker;
  if (loc.category === "ikea") {
    markers.addLayer(marker); // Cluster the IKEAs
  } else {
    map.addLayer(marker);     // Put custom places straight on the map!
  }
}

// -------- POPUP --------
function createPopup(loc){
  // CUSTOM PLACES (editable UI)
  if(loc.category === "date" || loc.category === "visited"){
    return `
      <div style="min-width:180px">
        <input id="edit-name-${loc.id}" value="${loc.name}" style="width:100%; margin-bottom:5px;"/>

        <select id="edit-type-${loc.id}" style="width:100%; margin-bottom:5px;">
          <option value="date" ${loc.category==="date"?"selected":""}>💕 Date</option>
          <option value="visited" ${loc.category==="visited"?"selected":""}>📍 Visited</option>
        </select>

        <button onclick="saveEdit('${loc.id}')">💾 Save</button>
        <button onclick="removePlace('${loc.id}')" style="background:#dc3545;">🗑</button>
      </div>
    `;
  }

  // IKEA stays same
  if(isVisited(loc.id)){
    return `<div style="text-align:center;"><b>${loc.name}</b><br>✅ Visited<br>
      <button onclick="toggleVisited('${loc.id}')">Unmark</button></div>`;
  }

  return `<div style="text-align:center;"><b>${loc.name}</b><br>
    <button onclick="toggleVisited('${loc.id}')">Mark visited</button></div>`;
}

function saveEdit(id){
  const loc = locations.find(l => l.id === id);
  if(!loc) return;

  const newName = document.getElementById(`edit-name-${id}`).value;
  const newType = document.getElementById(`edit-type-${id}`).value;

  if(!newName){
    alert("Name cannot be empty");
    return;
  }

  // Update data
  loc.name = newName;
  loc.category = newType;

  // Update marker icon + popup
  loc.marker.setIcon(getIcon(loc));
  loc.marker.setPopupContent(createPopup(loc));

  saveCustomPlaces();
  updateAll();
  loc.marker.closePopup();
}

function removePlace(id){
  if(!confirm("Remove this place?")) return;

  const index = locations.findIndex(l => l.id === id);
  if(index === -1) return;

  const loc = locations[index];

  if (loc.category === "ikea") {
    markers.removeLayer(loc.marker);
  } else {
    map.removeLayer(loc.marker);
  }

  locations.splice(index, 1);

  saveCustomPlaces();
  updateAll();
}

// -------- TOGGLE IKEA --------
function toggleVisited(id){
  if(isVisited(id)){
    localStorage.removeItem(id);
  } else {
    localStorage.setItem(id, "true");
  }

  // INSTED OF CLEARING ALL LAYERS, we just update the specific marker that was clicked!
  const loc = locations.find(l => l.id === id);
  if(loc && loc.marker) {
    loc.marker.setIcon(getIcon(loc));
    loc.marker.setPopupContent(createPopup(loc));
    markers.refreshClusters(loc.marker);
  }

  updateAll();
}

// -------- COUNTER --------
function updateAll(){
  const visited = ikeaLocations.filter(l => isVisited(l.id)).length;

  document.getElementById('counter').textContent =
    `Visited IKEA: ${visited}/${ikeaLocations.length}`;

  document.getElementById('progressBar').style.width =
    (visited/ikeaLocations.length*100)+'%';

  updateStatsPanel(); 
}

// -------- STATS --------
function toggleStatsPanel(){
  const p=document.getElementById('statsPanel');
  p.style.display=p.style.display==='none'?'block':'none';
}

function updateStatsPanel(){
  const visitedLocations = ikeaLocations.filter(l => isVisited(l.id));

  const continentsVisited = {};
  const countriesVisited = {};

  visitedLocations.forEach(l => {
    if(!l.continent || !l.country) return;

    continentsVisited[l.continent] = (continentsVisited[l.continent] || 0) + 1;
    countriesVisited[l.country] = (countriesVisited[l.country] || 0) + 1;
  });

  let html = "";

  html += `<strong>Total Continents Visited:</strong> ${Object.keys(continentsVisited).length}<br>`;
  html += `<strong>Total Countries Visited:</strong> ${Object.keys(countriesVisited).length}<br><br>`;

  html += `<strong>Visited per Continent:</strong><br>`;
  for(const [c,count] of Object.entries(continentsVisited)){
    html += `${c}: ${count}<br>`;
  }

  html += `<br><strong>Visited per Country:</strong><br>`;
  for(const [c,count] of Object.entries(countriesVisited)){
    html += `${c}: ${count}<br>`;
  }

  document.getElementById('statsPanel').innerHTML = html;
}

// -------- ADD MODE --------
let addMode=false;
let clickedLatLng=null;

function enableAddMode(){
  alert("Click on the map to add a place");
  addMode=true;
}

map.on('click', function(e){
  if(!addMode) return;

  clickedLatLng = e.latlng;

  document.getElementById('formOverlay').style.display='flex';
  addMode=false;
});


// -------- FORM --------
function closeForm(){
  document.getElementById('formOverlay').style.display='none';
}

function savePlace(){
  const name = document.getElementById('placeName').value;
  const type = document.getElementById('placeType').value;

  if(!name){
    alert("Enter a name!");
    return;
  }

  if(!clickedLatLng){
    alert("Click on the map first!");
    return;
  }

  const newPlace = {
    id: type + "-" + Date.now(),
    name: name,
    lat: clickedLatLng.lat,
    lng: clickedLatLng.lng,
    category: type,
    continent: "Unknown",
    country: "Unknown"
  };

  locations.push(newPlace);

  saveCustomPlaces();
  addMarker(newPlace);

  updateAll(); 

  closeForm();

  document.getElementById('placeName').value = "";
}

// -------- INIT --------
loadCustomPlaces();
locations.forEach(addMarker);
updateAll();

</script>
